<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pilot Lounge - Limit or Bust</title>
<meta name="theme-color" content="#01172b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pilot Lounge">
<link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="logo.jpg">
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link rel="stylesheet" href="styles.css">
<style>
.subjbar{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;justify-content:center}
.chip{font-family:var(--mono);font-size:12px;padding:8px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.18);background:transparent;color:var(--muted);cursor:pointer;min-height:34px;display:inline-flex;align-items:center}
.chip.on{background:var(--amber);color:#01172b;border-color:var(--amber)}
.linkbtn{display:inline-flex;align-items:center;font-family:var(--mono);font-size:13px;padding:10px 14px;min-height:44px;border-radius:8px;border:1px solid var(--amber);color:var(--amber);text-decoration:none}
.linkbtn:hover{background:var(--amber);color:#01172b}
.revhead{font-family:var(--mono);font-size:13px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin:20px 0 10px;text-align:left}
.revbtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
</style>
</head>
<body>
<a class="back" href="index.html">&#9664; Lounge</a>
<div class="wrap">
  <header class="app">
    <h1>Limit or Bust <span class="sub">Private</span></h1>
    <span class="src" id="best">best 0</span>
  </header>
  <div class="tbar"><div class="tfill" id="tf"></div></div>
  <div id="app"></div>
  <footer>Pick subjects, then answer before the bar runs out. Wrong or out of time costs a life. Tap Source to learn why. Review what you missed at the end.</footer>
</div>

<script src="data/private.js"></script>
<script src="data/subjects.js"></script>
<script>
  var ALL = window.PILOT_LOUNGE.private.questions.slice();
  var subjectOf = window.PILOT_LOUNGE.subjectOf;
  var present = window.PILOT_LOUNGE.subjectOrder.filter(function(s){ return ALL.some(function(q){ return subjectOf(q.acs) === s; }); });
  var selected = {}; present.forEach(function(s){ selected[s] = true; });
  var TMAX = 9000, idx, order, score, streak, lives, timer, locked, spOpen = false, missed = [];
  var best = +(localStorage.getItem('pl_lob_best') || 0);
  document.getElementById('best').textContent = 'best ' + best;
  var app = document.getElementById('app'), tf = document.getElementById('tf');

  function shuffle(a){ for(var j=a.length-1;j>0;j--){ var k=Math.floor(Math.random()*(j+1)); var t=a[j]; a[j]=a[k]; a[k]=t; } return a; }

  function chips(host){
    host.innerHTML = '';
    var allOn = present.every(function(s){ return selected[s]; });
    var a = document.createElement('button'); a.className = 'chip' + (allOn ? ' on' : ''); a.textContent = 'All';
    a.onclick = function(){ var v = !allOn; present.forEach(function(s){ selected[s] = v; }); chips(host); };
    host.appendChild(a);
    present.forEach(function(s){
      var b = document.createElement('button'); b.className = 'chip' + (selected[s] ? ' on' : ''); b.textContent = s;
      b.onclick = function(){ selected[s] = !selected[s]; if(present.every(function(x){ return !selected[x]; })){ selected[s] = true; } chips(host); };
      host.appendChild(b);
    });
  }

  function makeReview(host, items){
    host.innerHTML = '';
    if(!items.length){ host.innerHTML = '<p style="color:var(--muted)">Nothing missed. Clean sweep.</p>'; return; }
    items.forEach(function(item){
      var ep = window.PILOT_LOUNGE.episodeForSubject(subjectOf(item.acs));
      var card = document.createElement('div'); card.className = 'card'; card.style.textAlign = 'left';
      card.innerHTML = '<div class="meta"><span class="acs">'+item.acs+'</span></div>'
        + '<div class="q" style="font-size:16px; margin:0 0 10px">'+item.q+'</div>'
        + '<div style="color:var(--green); font-weight:700; margin-bottom:4px">Correct: '+item.choices[item.a]+'</div>'
        + '<div class="revbtns"></div><div class="srcpanel"></div>';
      var btns = card.querySelector('.revbtns'); var panel = card.querySelector('.srcpanel');
      var sb = document.createElement('button'); sb.className = 'srcbtn'; sb.textContent = 'Source'; btns.appendChild(sb);
      if(ep){ var la = document.createElement('a'); la.className = 'linkbtn'; la.href = 'podcast.html#ep' + ep.n; la.textContent = ep.audio ? ('Listen: Ep ' + ep.n) : ('Episode ' + ep.n); btns.appendChild(la); }
      panel.innerHTML = '<div class="lbl">Source: '+item.src.doc+'</div><div class="ref">'+item.src.ref+'</div>'
        + '<div class="quote">&ldquo;'+item.src.quote+'&rdquo;</div>'
        + '<a href="'+item.src.url+'" target="_blank" rel="noopener">'+item.src.url+'</a>';
      var open = false; sb.onclick = function(){ open = !open; panel.className = 'srcpanel' + (open ? ' show' : ''); };
      host.appendChild(card);
    });
  }

  function intro(){
    clearInterval(timer); tf.style.width='100%'; tf.className='tfill';
    app.innerHTML = '<div class="card center"><p class="q">Ready?</p>'
      + '<p style="color:var(--muted)">Pick your subjects, then tap the correct answer before the timer empties.</p>'
      + '<div class="subjbar" id="pick"></div>'
      + '<button class="primary" onclick="startGame()">Start</button></div>';
    chips(document.getElementById('pick'));
  }
  function startGame(){
    var pool = ALL.filter(function(q){ return selected[subjectOf(q.acs)]; });
    if(pool.length === 0) pool = ALL.slice();
    order = shuffle(pool.slice()); idx=0; score=0; streak=0; lives=3; missed=[]; round();
  }

  function round(){
    locked=false; spOpen=false;
    var item = order[idx % order.length];
    var html = '<div class="meta"><span>score '+score+'</span><span>streak '+streak+'</span>'
      + '<span>&#9829; '+lives+'</span><span class="acs">'+item.acs+'</span></div>'
      + '<div class="card"><div class="q">'+item.q+'</div><div class="row choices" id="ch"></div>'
      + '<div class="feed" id="feed"></div><div id="hold"></div></div>';
    app.innerHTML = html;
    var box = document.getElementById('ch');
    item.choices.forEach(function(c, ci){
      var b=document.createElement('button'); b.textContent=c; b.onclick=function(){ answer(ci); }; box.appendChild(b);
    });
    startTimer();
  }

  function startTimer(){
    clearInterval(timer); var t0=Date.now();
    timer=setInterval(function(){
      var left=TMAX-(Date.now()-t0); var pct=Math.max(0,left/TMAX*100);
      tf.style.width=pct+'%';
      tf.className='tfill'+(pct<50?' warn':'')+(pct<22?' crit':'');
      if(left<=0){ clearInterval(timer); answer(null); }
    },60);
  }

  function answer(choice){
    if(locked) return; locked=true; clearInterval(timer);
    var item = order[idx % order.length];
    var ok = (choice!==null && choice===item.a);
    var btns = document.querySelectorAll('#ch button');
    btns.forEach(function(b,bi){ b.disabled=true; if(bi===item.a) b.className='correct'; else if(bi===choice) b.className='wrong'; });
    var feed=document.getElementById('feed');
    if(ok){
      score++; streak++;
      if(score>best){ best=score; localStorage.setItem('pl_lob_best',best); document.getElementById('best').textContent='best '+best; }
      feed.className='feed ok'; feed.textContent='Correct.';
    } else {
      lives--; streak=0;
      if(!missed.some(function(m){ return m.id===item.id; })) missed.push(item);
      feed.className='feed no'; feed.textContent=(choice===null?'Out of time. ':'Not quite. ')+'Correct answer highlighted.';
    }
    var hold=document.getElementById('hold');
    hold.innerHTML = '<div class="row" style="margin-top:14px"><button class="srcbtn" onclick="toggleSrc()">Source</button>'
      + '<div class="srcpanel" id="sp"></div></div>'
      + '<button class="primary" style="margin-top:12px" onclick="cont()">'+(lives<=0?'See score':'Continue')+' &#9654;</button>';
    document.getElementById('sp').innerHTML = '<div class="lbl">Source: '+item.src.doc+'</div>'
      + '<div class="ref">'+item.src.ref+'</div>'
      + '<div class="quote">&ldquo;'+item.src.quote+'&rdquo;</div>'
      + '<a href="'+item.src.url+'" target="_blank" rel="noopener">'+item.src.url+'</a>';
  }
  function toggleSrc(){ spOpen=!spOpen; var sp=document.getElementById('sp'); if(sp) sp.className='srcpanel'+(spOpen?' show':''); }
  function cont(){ spOpen=false; idx++; if(lives<=0) over(); else round(); }

  function retryMissed(){
    if(!missed.length) return;
    order = shuffle(missed.slice()); missed=[]; idx=0; score=0; streak=0; lives=3; round();
  }

  function over(){
    clearInterval(timer); tf.style.width='0%';
    app.innerHTML = '<div class="card center"><p class="q">Out of lives</p>'
      + '<div class="big">'+score+'</div><p style="color:var(--muted)">best '+best+' &middot; missed '+missed.length+'</p>'
      + '<div class="row" style="grid-template-columns:1fr 1fr; gap:10px; margin-top:6px">'
      + '<button id="retryBtn" onclick="retryMissed()">Retry missed ('+missed.length+')</button>'
      + '<button class="primary" onclick="intro()">Play again</button></div></div>'
      + '<div class="revhead">Review missed</div><div id="review"></div>';
    if(!missed.length){ document.getElementById('retryBtn').disabled = true; }
    makeReview(document.getElementById('review'), missed);
    window.scrollTo(0, 0);
  }

  document.addEventListener('keydown', function(e){
    var n=parseInt(e.key,10); if(!locked && n>=1 && n<=4) answer(n-1);
  });
  intro();
</script>
</body>
</html>
