<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pilot Lounge - Quiz</title>
<meta name="theme-color" content="#01172b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pilot Lounge">
<link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="logo.jpg">
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link rel="stylesheet" href="styles.css">
<style>
.certbar{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px}
.certbar .chip{font-weight:700}
.subjbar{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 4px}
.chip{font-family:var(--mono);font-size:12px;padding:8px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.18);background:transparent;color:var(--muted);cursor:pointer;min-height:34px;display:inline-flex;align-items:center}
.chip.on{background:var(--amber);color:#01172b;border-color:var(--amber)}
.certbar .chip.cert{border-color:rgba(255,255,255,.35)}
.certbar .chip.cert.on{background:var(--green,#3ddc97);color:#01172b;border-color:var(--green,#3ddc97)}
.linkbtn{display:inline-flex;align-items:center;font-family:var(--mono);font-size:13px;padding:10px 14px;min-height:44px;border-radius:8px;border:1px solid var(--amber);color:var(--amber);text-decoration:none}
.linkbtn:hover{background:var(--amber);color:#01172b}
.revhead{font-family:var(--mono);font-size:13px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin:20px 0 10px}
.revbtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
</style>
</head>
<body>
<a class="back" href="index.html">&#9664; Lounge</a>
<div class="wrap">
  <header class="app">
    <h1><span id="certTitle">Private Pilot</span> <span class="sub">Quiz</span></h1>
    <span class="src" id="acsdoc">FAA-S-ACS-6C</span>
  </header>

  <div class="certbar" id="certbar"></div>

  <div id="quizView">
    <div class="subjbar" id="subjbar"></div>

    <div class="meta">
      <span id="progress">Q 1</span>
      <span id="score">Correct 0</span>
      <span class="acs" id="acs"></span>
    </div>

    <div class="card">
      <div class="q" id="q">Loading...</div>
      <div class="row choices" id="choices"></div>
      <div class="feed" id="feed"></div>
      <div class="row" style="margin-top:14px; gap:10px; align-items:center">
        <button class="srcbtn" id="srcBtn" onclick="toggleSrc()" style="display:none">Source</button>
        <a class="linkbtn" id="listenBtn" href="#" style="display:none">Listen to the episode</a>
        <div class="srcpanel" id="srcPanel"></div>
      </div>
    </div>

    <div class="row" style="grid-template-columns:1fr 1fr; gap:10px">
      <button id="prevBtn" onclick="go(-1)">&#9664; Previous</button>
      <button class="primary" id="nextBtn" onclick="go(1)">Next &#9654;</button>
    </div>
    <button id="resultsBtn" onclick="showResults()" style="width:100%; margin-top:10px">See results &#9654;</button>
  </div>

  <div id="resultsView" style="display:none"></div>

  <footer>Pick a certificate, then pick subjects to drill, answer to reveal the result, tap Source for the reference, or Listen to hear the matching episode. See results to review what you missed.</footer>
</div>

<script src="data/student.js"></script>
<script src="data/private.js"></script>
<script src="data/instrument.js"></script>
<script src="data/commercial.js"></script>
<script src="data/atp.js"></script>
<script src="data/subjects.js"></script>
<script>
  var _qp = new URLSearchParams(location.search); var CERT = window.PILOT_LOUNGE.bankKey(_qp.get('cert') || _qp.get('rating'));
  var DATA = window.PILOT_LOUNGE[CERT];
  var ALL = DATA.questions;
  var subjectOf = window.PILOT_LOUNGE.subjectOf;
  var present = window.PILOT_LOUNGE.subjectOrderFor(CERT).filter(function(s){
    return ALL.some(function(q){ return subjectOf(q.acs) === s; });
  });
  var selected = {}; present.forEach(function(s){ selected[s] = true; });
  var params = new URLSearchParams(location.search);
  var pre = params.get('subjects');
  if(pre){
    var want = pre.split(',').map(function(s){ return s.trim(); });
    present.forEach(function(s){ selected[s] = want.indexOf(s) >= 0; });
    if(present.every(function(s){ return !selected[s]; })){ present.forEach(function(s){ selected[s] = true; }); }
  }
  var Q = ALL.slice();
  var i = 0, correct = 0, answered = {}, srcOpen = false, lastMissed = [];
  document.getElementById('certTitle').textContent = DATA.title;
  document.getElementById('acsdoc').textContent = DATA.acsDoc;
  document.title = 'Pilot Lounge - ' + DATA.title + ' Quiz';

  function certbar(){
    var bar = document.getElementById('certbar'); bar.innerHTML = '';
    window.PILOT_LOUNGE.certs.forEach(function(c){
      var b = document.createElement('button'); b.className = 'chip cert' + (c.key === CERT ? ' on' : ''); b.textContent = c.label;
      b.onclick = function(){ if(c.key !== CERT){ location.search = '?cert=' + c.key; } };
      bar.appendChild(b);
    });
  }

  function showView(name){
    document.getElementById('quizView').style.display = (name === 'quiz') ? 'block' : 'none';
    document.getElementById('resultsView').style.display = (name === 'results') ? 'block' : 'none';
  }

  function chips(){
    var bar = document.getElementById('subjbar'); bar.innerHTML = '';
    var allOn = present.every(function(s){ return selected[s]; });
    var a = document.createElement('button'); a.className = 'chip' + (allOn ? ' on' : ''); a.textContent = 'All';
    a.onclick = function(){ var v = !allOn; present.forEach(function(s){ selected[s] = v; }); chips(); applyFilter(); };
    bar.appendChild(a);
    present.forEach(function(s){
      var b = document.createElement('button'); b.className = 'chip' + (selected[s] ? ' on' : ''); b.textContent = s;
      b.onclick = function(){
        selected[s] = !selected[s];
        if(present.every(function(x){ return !selected[x]; })){ selected[s] = true; }
        chips(); applyFilter();
      };
      bar.appendChild(b);
    });
  }

  function applyFilter(){
    Q = ALL.filter(function(q){ return selected[subjectOf(q.acs)]; });
    if(Q.length === 0){ Q = ALL.slice(); }
    i = 0; correct = 0; answered = {}; showView('quiz'); render();
  }

  function render(){
    var item = Q[i]; srcOpen = false;
    document.getElementById('progress').textContent = 'Q ' + (i+1) + ' / ' + Q.length;
    document.getElementById('score').textContent = 'Correct ' + correct;
    document.getElementById('acs').textContent = item.acs;
    document.getElementById('q').textContent = item.q;
    var box = document.getElementById('choices'); box.innerHTML = '';
    var done = answered.hasOwnProperty(item.id);
    item.choices.forEach(function(c, idx){
      var b = document.createElement('button');
      b.textContent = c;
      if(done){
        if(idx === item.a) b.className = 'correct';
        else if(idx === answered[item.id]) b.className = 'wrong';
        b.disabled = true;
      } else {
        b.onclick = function(){ answer(idx); };
      }
      box.appendChild(b);
    });
    var feed = document.getElementById('feed');
    if(done){
      var ok = answered[item.id] === item.a;
      feed.textContent = ok ? 'Correct.' : 'Not quite. Correct answer highlighted.';
      feed.className = 'feed ' + (ok ? 'ok' : 'no');
      document.getElementById('srcBtn').style.display = 'inline-block';
    } else {
      feed.textContent = ''; feed.className = 'feed';
      document.getElementById('srcBtn').style.display = 'none';
    }
    var ep = window.PILOT_LOUNGE.episodeForSubject(subjectOf(item.acs));
    var lb = document.getElementById('listenBtn');
    if(ep && ep.audio){ lb.style.display = 'inline-flex'; lb.href = 'podcast.html#ep' + ep.n; lb.textContent = 'Listen: Ep ' + ep.n; }
    else if(ep){ lb.style.display = 'inline-flex'; lb.href = 'podcast.html#ep' + ep.n; lb.textContent = 'Episode: Ep ' + ep.n; }
    else { lb.style.display = 'none'; }
    buildSrc(item); applySrc();
    document.getElementById('prevBtn').disabled = (i === 0);
  }

  function answer(idx){
    var item = Q[i];
    if(answered.hasOwnProperty(item.id)) return;
    answered[item.id] = idx;
    if(idx === item.a) correct++;
    render();
  }

  function buildSrc(item){
    var p = document.getElementById('srcPanel');
    p.innerHTML = '<div class="lbl">Source: '+item.src.doc+'</div>'
      + '<div class="ref">'+item.src.ref+'</div>'
      + '<div class="quote">&ldquo;'+item.src.quote+'&rdquo;</div>'
      + '<a href="'+item.src.url+'" target="_blank" rel="noopener">'+item.src.url+'</a>';
  }
  function applySrc(){ document.getElementById('srcPanel').className = 'srcpanel' + (srcOpen ? ' show' : ''); }
  function toggleSrc(){ srcOpen = !srcOpen; applySrc(); }

  function go(d){
    var n = i + d;
    if(n < 0) return;
    if(n >= Q.length){ showResults(); return; }
    i = n; render();
  }

  function makeReview(host, items){
    host.innerHTML = '';
    if(!items.length){ host.innerHTML = '<p style="color:var(--muted)">Nothing missed. Clean sweep.</p>'; return; }
    items.forEach(function(item){
      var ep = window.PILOT_LOUNGE.episodeForSubject(subjectOf(item.acs));
      var card = document.createElement('div'); card.className = 'card';
      card.innerHTML = '<div class="meta"><span class="acs">'+item.acs+'</span></div>'
        + '<div class="q" style="font-size:16px; margin:0 0 10px">'+item.q+'</div>'
        + '<div style="color:var(--green); font-weight:700; margin-bottom:4px">Correct: '+item.choices[item.a]+'</div>'
        + '<div class="revbtns"></div>'
        + '<div class="srcpanel"></div>';
      var btns = card.querySelector('.revbtns');
      var panel = card.querySelector('.srcpanel');
      var sb = document.createElement('button'); sb.className = 'srcbtn'; sb.textContent = 'Source'; btns.appendChild(sb);
      if(ep){ var la = document.createElement('a'); la.className = 'linkbtn'; la.href = 'podcast.html#ep' + ep.n; la.textContent = ep.audio ? ('Listen: Ep ' + ep.n) : ('Episode ' + ep.n); btns.appendChild(la); }
      panel.innerHTML = '<div class="lbl">Source: '+item.src.doc+'</div><div class="ref">'+item.src.ref+'</div>'
        + '<div class="quote">&ldquo;'+item.src.quote+'&rdquo;</div>'
        + '<a href="'+item.src.url+'" target="_blank" rel="noopener">'+item.src.url+'</a>';
      var open = false; sb.onclick = function(){ open = !open; panel.className = 'srcpanel' + (open ? ' show' : ''); };
      host.appendChild(card);
    });
  }

  function showResults(){
    var ans = Q.filter(function(q){ return answered.hasOwnProperty(q.id); });
    lastMissed = Q.filter(function(q){ return answered.hasOwnProperty(q.id) && answered[q.id] !== q.a; });
    var rv = document.getElementById('resultsView');
    rv.innerHTML = '<div class="card center"><p class="q" style="margin-top:0">Quiz results</p>'
      + '<div class="big">' + correct + ' / ' + ans.length + '</div>'
      + '<p style="color:var(--muted)">answered ' + ans.length + ' of ' + Q.length + ' &middot; missed ' + lastMissed.length + '</p>'
      + '<div class="row" style="grid-template-columns:1fr 1fr; gap:10px; margin-top:6px">'
      + '<button id="retryBtn" onclick="retryMissed()">Retry missed (' + lastMissed.length + ')</button>'
      + '<button class="primary" onclick="startOver()">Start over</button></div></div>'
      + '<div class="revhead">Review missed</div><div id="review"></div>';
    showView('results');
    if(!lastMissed.length){ document.getElementById('retryBtn').disabled = true; }
    makeReview(document.getElementById('review'), lastMissed);
    window.scrollTo(0, 0);
  }

  function retryMissed(){
    if(!lastMissed.length) return;
    Q = lastMissed.slice(); i = 0; correct = 0; answered = {}; showView('quiz'); render(); window.scrollTo(0, 0);
  }
  function startOver(){ applyFilter(); window.scrollTo(0, 0); }

  certbar(); chips(); render();
</script>
</body>
</html>
